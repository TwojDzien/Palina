<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Поздравление 🎉</title>
  <link rel="stylesheet" href="styles/page2.css">
</head>
<body>

  <!-- Гифка -->
  <div class="main" id="main">
    <img src="cat.gif" class="gif" alt="кот">
  </div>

  <!-- Попап -->
  <div id="popup">
    <p>Гэты кот не вытрымаў: у "глядзелках" ты проста вось такая → 💪. Ён вярнуў твой падарунак — вось кветка і грамата.</p>
    <button onclick="showGramata()">Паказаць грамату</button>
    <button onclick="showFlower()">Паказаць кветку</button>
  </div>

  <!-- Вспышка -->
  <div id="flash"></div>

  <!-- Фото -->
    <div id="photo">
      <img src="palina.jpg" alt="Фото">
    </div>
  
    <div id="gramata">
        <img src="gramata.webp" alt="Грамата">
    </div>

    <div id="flower">
     <img src="Flower.png" alt="kwetachka">
    </div>

  <script src="js/page2.js"></script>
</body>
</html>
